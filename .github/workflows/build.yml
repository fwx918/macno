name: Build macno

# Triggered by pushing a version tag (e.g. v1.0.0) or manually from the
# Actions tab. On a tag push, automatically creates a GitHub Release and
# attaches the Windows installer (.exe) to the release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # --publish never: the release step below uploads the .exe artifacts;
      # without it electron-builder ALSO auto-publishes on tag builds (that's
      # where the stray latest.yml/.blockmap assets on past releases came from —
      # useless without an auto-updater in the app).
      - name: Build
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
